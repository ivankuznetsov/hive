name: tui_two_pane_navigate
description: |
  v2 two-pane TUI — drives Tab/h/l keystrokes to verify pane focus
  shifts and the projects pane renders the registered project; then
  uses `n` to open the inline new-idea prompt and `Enter` to submit a
  fresh `1-inbox` task. Pinned against the asciinema-captured pane
  state by the same harness as PR #18's existing tui_* scenarios.
tags: [tui, v2]
steps:
  # Seed a task so the right pane has something to show besides the
  # eventual newly-created idea — keeps the dashboard warm and lets
  # the existing slug appear alongside the new one for forensic clarity.
  - kind: seed_state
    stage: 2-brainstorm
    slug: tui-two-pane-task
    state_file: brainstorm.md
    content: "# Brainstorm\n\n<!-- COMPLETE -->\n"

  # TUI lazy-boots on the first tui_* step. Anchor against the v2
  # header banner so we know the dashboard chrome rendered.
  - kind: tui_expect
    anchor: "hive tui"
    timeout: 5
  # The seeded task slug lands in the right pane (TasksPane).
  - kind: tui_expect
    anchor: "tui-two-pane-task"
    timeout: 5
  # `★ All projects` pinned at the top of the left pane — proves the
  # projects pane rendered, not just a single-pane fallback.
  - kind: tui_expect
    anchor: "All projects"
    timeout: 3

  # Tab cycles pane focus. After the first Tab, focus moves to the
  # left pane; the projects pane renders with the focused border style.
  # We assert presence of the project name to confirm the left pane
  # is alive (the border color itself is verified by manual dogfood —
  # lipgloss strips ANSI in test environments).
  - kind: tui_keys
    keys: "Tab"
  - kind: tui_expect
    anchor: "Projects"
    timeout: 3

  # `l` jumps focus back to the right pane.
  - kind: tui_keys
    keys: "l"

  # `n` opens the new-idea prompt at the bottom. The label format is
  # `New idea (project=...): ` so anchoring on `New idea` is sufficient.
  - kind: tui_keys
    keys: "n"
  - kind: tui_expect
    anchor: "New idea"
    timeout: 3

  # Type the title one character at a time (avoids Bubble Tea input
  # quirks; matches the v1 filter scenario pattern).
  - kind: tui_keys
    text: "rss feeds"

  # Submit — Enter dispatches `bin/hive new <project> "rss feeds"`.
  - kind: tui_keys
    keys: "Enter"
  # The dispatched `hive new` runs as a subprocess via run_quiet!;
  # wait for it to complete before asserting filesystem state.
  - kind: wait_subprocess
    timeout: 15

  # Verify the freshly created `1-inbox` folder. The slug is
  # auto-generated by `hive new` from the title; we just confirm a
  # `1-inbox` task was created (any new directory under that stage).
  - kind: state_assert
    path: "{sandbox}/.hive-state/stages/1-inbox"
    timeout: 5
  # The TUI is back in :grid mode after submission; the dashboard
  # chrome is visible.
  - kind: tui_expect
    anchor: "hive tui"
    timeout: 5

  # Clean exit.
  - kind: tui_keys
    keys: "q"
  - kind: wait_subprocess
    timeout: 5
